<header class="section-header">
    <h1>🏢 Кабінетний облік (Робочі місця)</h1>
</header>

<div class="admin-only form-toggle-container" style="margin-bottom: 20px;">
    <button class="btn-primary form-toggle-btn" onclick="window.toggleRoomForm()">
        ➕ Додати техніку в кабінет
    </button>
</div>

<div class="admin-only room-form-container" id="roomFormContainer" style="display: none; margin-bottom: 25px;">
    <div class="card form-card" style="margin-bottom: 0;">
        <div class="form-header">
            <h3 id="roomFormTitle">➕ Додати техніку в кабінет</h3>
            <button class="btn-secondary form-close-btn" onclick="window.toggleRoomForm()">✕</button>
        </div>
        <form id="roomAddForm">
            <input type="hidden" id="editRoomItemId">

            <div class="no-inv-checkbox">
                <input type="checkbox" id="noInvCheck">
                <label for="noInvCheck">🔴 БЕЗ ІНВЕНТАРНОГО НОМЕРА</label>
            </div>

            <div class="autocomplete-wrapper">
                <div class="field">
                    <input type="text" id="roomInv" placeholder=" " autocomplete="off">
                    <label for="roomInv">🔍 Інвентарний номер або назва техніки</label>
                </div>
                <div id="roomInvDropdown" class="autocomplete-dropdown"></div>
            </div>

            <div class="form-grid fields-grid">
                <div class="field">
                    <select id="roomLoc" required><option value="" disabled selected>Виберіть локацію</option></select>
                    <label>🏢 Будівля *</label>
                </div>
                <div class="field">
                    <input type="text" id="roomNum" required placeholder=" ">
                    <label>🚪 Кабінет *</label>
                </div>
                <div class="field">
                    <input type="text" id="roomSN" placeholder=" ">
                    <label>🔢 Серійний №</label>
                </div>
                <div class="field">
                    <select id="roomType" required><option value="" disabled selected>Виберіть тип</option></select>
                    <label>💻 Тип техніки *</label>
                </div>
                <div class="field">
                    <select id="roomModel" required><option value="" disabled selected>Виберіть модель</option></select>
                    <label>📱 Модель *</label>
                </div>
                <div class="field">
                    <select id="roomStatus">
                        <option value="В роботі">✅ В роботі</option>
                        <option value="В ремонті">🔧 В ремонті</option>
                        <option value="Для списання">⚠️ Для списання</option>
                        <option value="Готується на списання">📦 Готується на списання</option>
                    </select>
                    <label>📊 Статус</label>
                </div>
                <div class="field">
                    <input type="text" id="roomPerson" placeholder=" ">
                    <label>👤 Користувач</label>
                </div>
                <div class="field">
                    <input type="text" id="roomMVO" placeholder=" ">
                    <label id="roomMVOLabel">🔰 МВО</label>
                </div>
                <div class="field-group">
                    <div class="field">
                        <input type="text" id="roomIP" placeholder=" ">
                        <label>🌐 IP-адреса</label>
                    </div>
                    <div class="field">
                        <input type="text" id="roomHostname" placeholder=" ">
                        <label>💻 Hostname</label>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" id="roomSubmitBtn" class="btn-primary">💾 Зберегти</button>
                <button type="button" id="roomCancelBtn" class="btn-secondary" style="display: none;" onclick="window.cancelRoomEdit()">✕ Скасувати</button>
            </div>

            <input type="file" id="quickJsonUpload" accept=".json" style="display:none" onchange="window.handleQuickJsonUpload(event)">
        </form>
    </div>
</div>

<div class="card">
    <div class="filters-bar">
        <div class="filters-group">
            <div class="field filter-field">
                <select id="roomFilterLoc"><option value="all">Всі локації</option></select>
                <label>🏢 Локація</label>
            </div>
            <div class="field filter-field small">
                <input type="text" id="roomFilterNum" placeholder=" ">
                <label>🚪 №</label>
            </div>
            <div class="field filter-field">
                <select id="roomFilterStatus">
                    <option value="all">Всі статуси</option>
                    <option value="В роботі">✅ В роботі</option>
                    <option value="В ремонті">🔧 В ремонті</option>
                    <option value="Для списання">⚠️ Для списання</option>
                    <option value="Готується на списання">📦 Готується</option>
                </select>
                <label>📊 Статус</label>
            </div>
            <div class="field filter-field">
                <select id="roomFilterInvType">
                    <option value="all">Всі номери</option>
                    <option value="has_inv">🔢 З інвентарним</option>
                    <option value="no_inv">🔴 Без номера</option>
                </select>
                <label>📇 Тип інв.</label>
            </div>
            <div class="field filter-field search-field">
                <input type="text" id="roomFilterSearch" placeholder=" " oninput="window.renderRoomsTable()">
                <label>🔍 Пошук...</label>
            </div>
        </div>

        <div class="actions-group">
            <button class="btn-excel" onclick="window.openRoomExportModal()">📥 Excel (вибрати поля)</button>
            <button class="btn-secondary admin-only" onclick="document.getElementById('specsUploadInput').click()">💾 JSON</button>
            <input type="file" id="specsUploadInput" multiple accept=".json" style="display:none;" onchange="window.handleSpecsUpload(event)">
            <button class="btn-secondary" onclick="window.openBuildingFormularModal()">📄 Формуляр</button>
        </div>
    </div>

    <div class="table-container">
        <table id="roomsTable">
            <thead>
                <tr>
                    <th>📍 Локація / Кабінет</th>
                    <th>💻 Техніка</th>
                    <th>🔢 Номери / Мережа</th>
                    <th>👥 Відповідальні</th>
                    <th>📊 Статус</th>
                    <th class="actions-col">⚙️ Дії</th>
                </tr>
            </thead>
            <tbody id="roomsTableBody"></tbody>
        </table>
    </div>
</div>
