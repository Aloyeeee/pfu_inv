<header class="section-header">
    <h1>📊 Аналітика та Дашборд</h1>
</header>

<div class="dashboard-cards" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px;">
    <div class="card" style="border-left: 4px solid #3b82f6; padding: 20px;">
        <h3 style="margin: 0; font-size: 13px; color: var(--text-muted);">Майно на складі</h3>
        <p id="dashTotalStockPrice" style="font-size: 24px; font-weight: 700; margin: 10px 0 0; color: #3b82f6;">0 ₴</p>
    </div>
    <div class="card" style="border-left: 4px solid var(--primary); padding: 20px;">
        <h3 style="margin: 0; font-size: 13px; color: var(--text-muted);">Майно в кабінетах</h3>
        <p id="dashTotalRoomsPrice" style="font-size: 24px; font-weight: 700; margin: 10px 0 0; color: var(--text-dark);">0 ₴</p>
    </div>
    <div class="card" style="border-left: 4px solid #ef4444; padding: 20px;">
        <h3 style="margin: 0; font-size: 13px; color: var(--text-muted);">Списано / В ремонті</h3>
        <p id="dashTotalWrittenOffPrice" style="font-size: 24px; font-weight: 700; margin: 10px 0 0; color: #ef4444;">0 ₴</p>
    </div>
</div>

<div class="card" style="margin-bottom: 30px;">
    <h3 style="margin-top: 0; margin-bottom: 15px;">🔄 Останні дії в системі</h3>
    <div id="recentActionsList" style="max-height: 300px; overflow-y: auto;">
        <div style="padding: 20px; text-align: center; color: var(--text-muted);">Завантаження...</div>
    </div>
    <div style="margin-top: 15px; text-align: right;">
        <button class="btn-secondary" onclick="window.showTab('audit')">📋 Всі записи аудиту</button>
    </div>
</div>

<div class="form-grid" style="grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); align-items: start;">
    <div class="card"><h3 style="text-align: center; margin-top: 0; font-size: 14px;">Типи техніки</h3><div style="height: 250px; position: relative;"><canvas id="typeChart"></canvas></div></div>
    <div class="card"><h3 style="text-align: center; margin-top: 0; font-size: 14px;">Розподіл по локаціях</h3><div style="height: 250px; position: relative;"><canvas id="locationChart"></canvas></div></div>
    <div class="card"><h3 style="text-align: center; margin-top: 0; font-size: 14px;">Вік техніки</h3><div style="height: 250px; position: relative;"><canvas id="ageChart"></canvas></div></div>
    <div class="card"><h3 style="text-align: center; margin-top: 0; font-size: 14px;">Операційні системи</h3><div style="height: 250px; position: relative;"><canvas id="osChart"></canvas></div></div>
    <div class="card"><h3 style="text-align: center; margin-top: 0; font-size: 14px;">Оперативна пам'ять</h3><div style="height: 250px; position: relative;"><canvas id="ramChart"></canvas></div></div>
    <div class="card"><h3 style="text-align: center; margin-top: 0; font-size: 14px;">Типи накопичувачів</h3><div style="height: 250px; position: relative;"><canvas id="diskChart"></canvas></div></div>
    <div class="card"><h3 style="text-align: center; margin-top: 0; font-size: 14px;">Антивірусний захист</h3><div style="height: 250px; position: relative;"><canvas id="avChart"></canvas></div></div>
    <div class="card"><h3 style="text-align: center; margin-top: 0; font-size: 14px;">Версії Office</h3><div style="height: 250px; position: relative;"><canvas id="officeChart"></canvas></div></div>
</div>
